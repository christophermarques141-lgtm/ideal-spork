<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="64" ry="64"/>

  <!-- Title text -->
  <text
    x="50%"
    y="22%"
    text-anchor="middle"
    fill="#ffffff"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="40"
    font-weight="600"
  >
    Unblocked Games
  </text>

  <!-- Grid of game tiles -->
  <g transform="translate(96,140)">
    <!-- Row 1 -->
    <rect x="0"   y="0"   width="80" height="80" rx="12" fill="#202020"/>
    <rect x="96"  y="0"   width="80" height="80" rx="12" fill="#202020"/>
    <rect x="192" y="0"   width="80" height="80" rx="12" fill="#202020"/>
    <rect x="288" y="0"   width="80" height="80" rx="12" fill="#202020"/>

    <!-- Row 2 -->
    <rect x="0"   y="96"  width="80" height="80" rx="12" fill="#202020"/>
    <rect x="96"  y="96"  width="80" height="80" rx="12" fill="#202020"/>
    <rect x="192" y="96"  width="80" height="80" rx="12" fill="#202020"/>
    <rect x="288" y="96"  width="80" height="80" rx="12" fill="#202020"/>

    <!-- Row 3 -->
    <rect x="0"   y="192" width="80" height="80" rx="12" fill="#202020"/>
    <rect x="96"  y="192" width="80" height="80" rx="12" fill="#202020"/>
    <rect x="192" y="192" width="80" height="80" rx="12" fill="#202020"/>
    <rect x="288" y="192" width="80" height="80" rx="12" fill="#202020"/>

    <!-- Highlight a few tiles -->
    <rect x="0"   y="0"   width="80" height="80" rx="12" fill="#3b82f6"/>
    <rect x="192" y="96"  width="80" height="80" rx="12" fill="#22c55e"/>
    <rect x="288" y="192" width="80" height="80" rx="12" fill="#f97316"/>
  </g>

  <!-- Bottom bar hinting at taskbar -->
  <rect
    x="96"
    y="420"
    width="320"
    height="40"
    rx="20"
    fill="#101010"
  />
  <circle cx="176" y="440" r="12" fill="#ffffff" />
  <circle cx="256" y="440" r="12" fill="#ffffff" />
  <circle cx="336" y="440" r="12" fill="#ffffff" />
</svg>
