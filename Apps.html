<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Classroom </title>
        <link rel="icon" type="image/x-icon" href="https://classroom.google.com/favicon.ico">
</head>
<body>
<style>
         body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: black;
            color: white;
        }
        .btn {
            background-color: #0a0a0a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            text-decoration: none;
        }
        .btn img {
            width: 100%;
            height: 80%;
            object-fit: cover;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #333;
        }
        .container-apps {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 200px;
            grid-auto-rows: 200px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            left: 10px;
            top: -190px;
            position: absolute;
        }
        </style>
        // apps container
 <div class="container-apps">
        <a href="apps/Chat Bot AI (A.I GPT).html" class="btn"><img src="App assets/253.png" alt="App 1"><span>Chat Bot</span></a>
        <a href="apps/Soundboard.html" class="btn"><img src="App assets/179.png" alt="App 2"><span>soundboard</span></a>
    </div>
     <button class="taskbar"> Taskbar </button>
    <div>
    <a>
    <style>
        .taskbar {
            position:fixed;
            background: #121212;
            color: #121212;
            border: none;
            border-radius: 10px;
            align-self: center;
            width: 390px;
            height: 60px;
            left: 50%;
            transform: translateX(-50%);
            bottom: 10px;
            font-display: none;
            drop-shadow: 100px 100px 100px #000;
            left: 50%;
            transform: translateX(-50%);
        }

    </style>
    <img src="Icons/Home.png" alt="Home"; href="Apps.html" style="position: fixed; left: 550px; bottom: 10px; width: 60px; height: 60px;" class="home">
    <img src="Icons/Games.png" alt="Games"; href="Games.html" style="position: fixed; left: 615px; bottom: 12px; width: 55px; height: 55px;" class="games">
    </a>
    </div>
    <style>
        .home:hover {
            transition: 0.3s;
            transform: scale(1.1);
        }
        .games:hover {
            transition: 0.3s;
            transform: scale(1.2);
        }
    </style>
    <a href="games.html" <img src="Icons/Games.png" alt="Games" style="position: fixed; left: 615px; bottom: 12px; width: 55px; height: 55px;" class="games"></a>
    <a href="Apps.html" <img src="Icons/Home.png" alt="Home" style="position: fixed; left: 550px; bottom: 10px; width: 60px; height: 60px;" class="apps"></a>
</body>
</html>
